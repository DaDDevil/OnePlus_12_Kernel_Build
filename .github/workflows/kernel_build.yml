name: OP12_Kernel_Build_Optimized

on: 
  workflow_dispatch: 

# 核心环境变量，一次定义，全局通用
env:
  CCACHE_DIR: /home/runner/.ccache
  KERNEL_MSM_DIR: /home/runner/workspace/kernel_platform/msm-kernel
  KERNEL_COMMON_DIR: /home/runner/workspace/kernel_platform/common
  WORK_DIR: /home/runner/workspace/kernel_platform
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 释放磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false # 如果你不需要官方庞大的 Android SDK
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false
        
      - name: 设置虚拟内存 (Swap)
        uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 15
          
      - name: 安装环境依赖 (带 ccache)
        run: |
          sudo apt-get update
          sudo apt-get install -y bc git wget flex bison libssl-dev libelf-dev clang lld llvm python3 dwarves cpio xz-utils ccache
          
      - name: 配置 CCache 编译缓存 (提速神器)
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}  # <--- 动态引用全局变量
          key: ${{ runner.os }}-kernel-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-kernel-ccache-

      - name: 初始化 CCache 物理结界
        run: |
          # 就算天塌下来，也要先把这个文件夹捏出来
          mkdir -p ${{ env.CCACHE_DIR }}
          # 把缓存上限从默认的 500M 强行拉爆到 5GB
          ccache -M 5G

      - name: 拉取内核源码 && 编译工具 && 内核补丁
        run: |
          mkdir workspace && cd workspace
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8650 -m oneplus_12_b.xml --depth=1
          repo sync -c -j8 --no-clone-bundle --no-tags
          # 内核补丁
          https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/04.use_android_abi_padding_for_sysvipc_task_struct.patch ${{ env.KERNEL_COMMON_DIR }}
          https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/02.fix_restore%20cgroup%20file%20prefix%20handling%20.patch ${{ env.KERNEL_COMMON_DIR }}
          https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/01.6.1%2B_disable_crc_checks_for_lkms.patch ${{ env.KERNEL_COMMON_DIR }}
          cd ${{ env.KERNEL_COMMON_DIR}}
          for i in *.patch; do patch -p1 < "$i"; done
      
      - name: 安装 KernelSU_Next
        run: |
          cd ${{ env.KERNEL_COMMON_DIR }}
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -

      - name: 源码级修复与“上帝模式”破解
        run: |
          cd ${{ env.KERNEL_COMMON_DIR }}
          # 1. 洗白内核版本号后缀
          sed -i 's/-dirty//g' scripts/setlocalversion
          # 2. 终极签名破解：使用 Python 精准替换 module_sig_check 函数
          cat << 'EOF' > patch_sig.py
          import re
          with open('kernel/module/signing.c', 'r') as f:
              content = f.read()
          # 强行把函数体替换为直接放行
          content = re.sub(r'int module_sig_check\(.*?\)\s*\{.*?\n\}', 'int module_sig_check(struct load_info *info, int flags) {\n\tinfo->sig_ok = true;\n\treturn 0;\n}', content, flags=re.DOTALL)
          with open('kernel/module/signing.c', 'w') as f:
              f.write(content)
          EOF
          python3 patch_sig.py
          echo "✅ 签名保护已物理拆除"
          rm -rf ./android/abi_gki_protected_exports_*
          rm -rf ${{ env.KERNEL_MSM_DIR}}/android/abi_gki_protected_exports_*
      
      - name: 配置内核并注入 Docker 选项
        run: |
          cd ${{ env.KERNEL_MSM_DIR }}/arch/arm64/configs/vendor
          wget https://raw.githubusercontent.com/DaDDevil/OnePlus_12_Kernel_Build/refs/heads/bazel/additional_features.config
          cat additional_features.config >> pineapple_GKI.config
          
      - name: 开始编译内核 (火力全开)
        run: |
          cd ${{ env.WORK_DIR }}
          ccache -z # 归零缓存统计
          ./kernel_platform/oplus/build/oplus_build_kernel.sh pineapple gki
          
      - name: 制作 AnyKernel3 刷机包 (逻辑重构)
        run: |
          cd ${{ env.WORK_DIR }}/out/
          zip -r9y ../flasher.zip *

      - name: 🚀 发布最终成品
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus12-Kernel-Build
          path: |
            ${{ env.WORK_DIR }}/flasher.zip
          compression-level: 0 # 已经是zip了，不要再让 Action 费力压缩
