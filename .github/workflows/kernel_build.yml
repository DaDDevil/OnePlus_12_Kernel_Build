name: OP12_Kernel_Build_Optimized

on: 
  workflow_dispatch: 
    inputs:
      kernel_repo:
        description: '请输入内核源码仓库地址:'
        required: true
      kernel_vendor_repo:
        description: '请输入内核vendor源码仓库地址:'
        required: true
      kernel_devicetrees_repo:
        description: '请输入内核devicetrees源码仓库地址:'
        required: true

# 核心环境变量，一次定义，全局通用
env:
  WORKDIR: /home/runner
  KERNEL_DIR: /home/runner/android_kernel_oneplus_sm8650
  CLANG_DIR: /home/runner/aosp_clang
  CCACHE_DIR: /home/runner/.ccache
  # 把那一大串编译参数全部收拢为一个变量，并注入 ccache
  MAKE_ENV: ARCH=arm64 O=out LLVM=1 LLVM_IAS=1 CC="ccache clang" LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump READELF=llvm-readelf STRIP=llvm-strip HOSTCC="ccache clang" HOSTCXX="ccache clang++" HOSTLD=ld.lld CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-Wno-error"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 释放磁盘空间 (The Purge)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/share/swift
          
      - name: 设置虚拟内存 (Swap)
        uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 15
          
      - name: 安装环境依赖 (带 ccache)
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git wget flex bison libssl-dev libelf-dev clang lld llvm python3 dwarves cpio xz-utils ccache
          
      - name: 配置 CCache 编译缓存 (提速神器)
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}  # <--- 动态引用全局变量
          key: ${{ runner.os }}-kernel-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-kernel-ccache-

      - name: 初始化 CCache 物理结界
        run: |
          # 就算天塌下来，也要先把这个文件夹捏出来
          mkdir -p ${{ env.CCACHE_DIR }}
          # 把缓存上限从默认的 500M 强行拉爆到 5GB
          ccache -M 5G


      - name: 下载并配置 Clang 编译器
        run: |
          cd ${{ env.WORKDIR }}
          wget -q https://github.com/bachnxuan/aosp_clang_mirror/releases/download/clang-r596125-15071444/clang-r596125.tar.gz
          mkdir -p ${{ env.CLANG_DIR }}
          tar -zxf clang-r596125.tar.gz -C ${{ env.CLANG_DIR }}
          # 直接将 clang 的 bin 目录和 ccache 注入环境变量
          echo "PATH=${{ env.CLANG_DIR }}/bin:/usr/lib/ccache:$PATH" >> $GITHUB_ENV
          echo "✅ 编译器部署完毕"

      - name: 拉取内核源码 (精准对齐软链接)
        run: |
          cd ${{ env.WORKDIR }}
          # 逻辑重构：git clone 时直接指定目标文件夹名字，一步剥离 "android_kernel_oneplus_" 前缀
          # 且让这三个仓库在 /home/runner/ 下保持绝对的平级关系，完美修复 ../ 软链接指向
          git clone --depth=1 ${{ github.event.inputs.kernel_repo }} android_kernel_oneplus_sm8650
          git clone --depth=1 ${{ github.event.inputs.kernel_vendor_repo }} sm8650-modules
          git clone --depth=1 ${{ github.event.inputs.kernel_devicetrees_repo }} sm8650-devicetrees
          echo "✅ 源码拉取完毕，平级目录结构就绪"

      - name: 安装 KernelSU_Next
        run: |
          cd ${{ env.KERNEL_DIR }}
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -

      - name: 源码级修复与“上帝模式”破解
        run: |
          cd ${{ env.KERNEL_DIR }}
          # 1. 修复 Tracepoint 相对路径问题
          sed -i '133s/$/ \\/; 133a \                     -I$(srctree)\/$(src)' scripts/Makefile.lib
          # 2. 洗白内核版本号后缀
          sed -i 's/-dirty//g' scripts/setlocalversion
          
          # 3. 终极签名破解：使用 Python 精准替换 module_sig_check 函数
          cat << 'EOF' > patch_sig.py
          import re
          with open('kernel/module/signing.c', 'r') as f:
              content = f.read()
          # 强行把函数体替换为直接放行
          content = re.sub(r'int module_sig_check\(.*?\)\s*\{.*?\n\}', 'int module_sig_check(struct load_info *info, int flags) {\n\tinfo->sig_ok = true;\n\treturn 0;\n}', content, flags=re.DOTALL)
          with open('kernel/module/signing.c', 'w') as f:
              f.write(content)
          EOF
          python3 patch_sig.py
          echo "✅ 签名保护已物理拆除"
          rm -rf ./android/abi_gki_protected_exports_*
          sed -i '2748a \nflags |= MODULE_INIT_IGNORE_MODVERSIONS;\nflags |= MODULE_INIT_IGNORE_VERMAGIC;\n' kernel/module/main.c

      - name: 🛠️ 植入 Docker 终极修复补丁
        run: |
          cd ${{ env.KERNEL_DIR }}
          wget https://raw.githubusercontent.com/DaDDevil/OnePlus_12_Kernel_Build/refs/heads/main/module_fix.patch
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/01.6.1%2B_disable_crc_checks_for_lkms.patch
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/02.fix_restore%20cgroup%20file%20prefix%20handling%20.patch
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/03.5.15%2B_use_android_abi_padding_for_posix_mqueue.patch
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/04.use_android_abi_padding_for_sysvipc_task_struct.patch
          for i in *.patch; do patch -p1 < "$i"; done
      
      - name: 配置内核并注入 Docker 选项
        run: |
          cd ${{ env.KERNEL_DIR }}
          # 基础配置
          make ${{ env.MAKE_ENV }} gki_defconfig vendor/pineapple_GKI.config vendor/oplus/pineapple_GKI.config

          sed -i 's/CONFIG_PANIC_TIMEOUT=-1/CONFIG_PANIC_TIMEOUT=5/g' out/.config
          sed -i 's/cgroup_disable=pressure //g' out/.config
          # 注入 Docker/LXC 所需配置
          ./scripts/config --file out/.config -e PID_NS -e USER_NS -e MODULE_SIG_PROTECT -e DEVTMPFS -e SYSVIPC -e BRIDGE_NETFILTER -e NF_CONNTRACK_NETLINK -e FW_LOADER_COMPRESS -e IKCONFIG_PROC -e IKCONFIG -e IP6_NF_NAT -e IP6_NF_TARGET_MASQUERADE -e CGROUP_PIDS -e CGROUP_DEVICE -e MODULE_FORCE_LOAD=y
          #./scripts/config --file out/.config -e IP_SCTP -e IP_VS -e IP_VS_NFCT -e IP_VS_PROTO_TCP -e IP_VS_PROTO_UDP -e IP_VS_RR -e NFT_CT -e NFT_MASQ -e NFT_NAT
          # 应用并补全依赖
          #make ${{ env.MAKE_ENV }} olddefconfig
          echo "[*] 正在注射 透明巨大页 (THP) 续命血清..."
          # 开启透明大页核心支持
          ./scripts/config --file out/.config -e TRANSPARENT_HUGEPAGE
          # 建议设为 MADVISE (按需分配)，而不是 ALWAYS，避免宿主机日常使用内存爆炸
          ./scripts/config --file out/.config -d TRANSPARENT_HUGEPAGE_ALWAYS -e TRANSPARENT_HUGEPAGE_MADVISE
          # 确保共享内存 (shmem) 支持大页，这对 crosvm 极其重要
          ./scripts/config --file out/.config -e TRANSPARENT_HUGE_PAGECACHE
          
      - name: 开始编译内核 (火力全开)
        run: |
          cd ${{ env.KERNEL_DIR }}
          echo "CONFIG_WAFFLE_DTB=y" >> arch/arm64/configs/vendor/oplus/pineapple_GKI.config
          echo "CONFIG_OPLUS_DEVICE_DTBS=y" >> arch/arm64/configs/vendor/oplus/pineapple_GKI.config
          ccache -z # 归零缓存统计
          make ${{ env.MAKE_ENV }} -j$(nproc)
          ccache -s # 打印缓存命中率

      - name: 收集ko模块
        run: |
          cd ${{ env.KERNEL_DIR }}
          mkdir -p out/dist
          make ${{ env.MAKE_ENV }} INSTALL_MOD_PATH=out/dist modules_install
          zip -r9y ./kernel_modules.zip out/dist/*
          
      - name: 制作 AnyKernel3 刷机包 (逻辑重构)
        run: |
          cd ${{ env.WORKDIR }}
          git clone --depth=1 https://github.com/cctv18/AnyKernel3.git AnyKernel3
          
          # 1. 拷贝内核到 AK3
          cp ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image ./AnyKernel3/
      
          # 2. 删除无用文件并规范打包（-y 保留符号链接，非常重要）
          rm -rf ./AnyKernel3/.git README.md
          cd ./AnyKernel3
          zip -r9y ../OnePlus12-Kernel-AK3.zip *

      - name: 🚀 发布最终成品
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus12-Kernel-Build
          path: |
            ${{ env.WORKDIR }}/OnePlus12-Kernel-AK3.zip
            ${{ env.KERNEL_DIR }}/kernel_modules.zip
          compression-level: 0 # 已经是zip了，不要再让 Action 费力压缩
