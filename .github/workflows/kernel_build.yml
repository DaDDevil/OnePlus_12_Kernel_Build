name: OP12_Kernel_Build

on: 
  workflow_dispatch: 
      inputs:
        kernel_repo:
            description: '请输入内核源码仓库地址:'
            required: true
        kernel_vendor_repo:
            description: '请输入内核vendor源码仓库地址:'
            required: true
        kernel_devicetrees_repo:
            description: '请输入内核devicetrees源码仓库地址:'
            required: true
        kernel_defconfig:
            description: '请输入你要编译的配置文件:'
            required: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 释放磁盘空间
        run: |
         sudo rm -rf /usr/share/dotnet
         sudo rm -rf /usr/local/lib/android
         sudo rm -rf /opt/ghc
         sudo rm -rf "/usr/local/share/boost"
         sudo rm -rf /usr/share/swift
      - name: Set Swap Space
        uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 15
          
      - name: 创建编译目录
        run: |
          cd ~ && mkdir build_tools && mkdir kernel_source
      - name: 安装环境依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git wget flex bison libssl-dev libelf-dev clang lld llvm python3 dwarves cpio xz-utils
      - name: 设置编译器环境
        run: |
          cd ~/build_tools
          wget https://github.com/bachnxuan/aosp_clang_mirror/releases/download/clang-r596125-15071444/clang-r596125.tar.gz
          mkdir -p aosp_clang
          tar -zxvf clang-r596125.tar.gz -C aosp_clang && ls
          pwd
          CLANG_BIN_PATH=$(find . -name "clang" -type f -executable -printf "%h\n" | head -n 1)
          if [ -z "$CLANG_BIN_PATH" ]; then
            echo "❌ 错误：在工作目录中找不到 clang 执行文件！"
            exit 1
          fi
          ABS_CLANG_PATH=$(realpath "$CLANG_BIN_PATH")
          echo "✅ 找到 Clang 路径: $ABS_CLANG_PATH"
          # 3. 注入 GitHub 环境变量（核心步骤）
          echo "$ABS_CLANG_PATH" >> $GITHUB_PATH
          export PATH=$CLANG_BIN_PATH:$PATH
          echo "编译器安装路径:$(pwd)/aosp_clang"
          echo "编译器bin目录:$CLANG_BIN_PATH"
      - name: 拉取内核源码
        run: |
          cd ~/kernel_source
          git clone --depth=1 ${{ github.event.inputs.kernel_repo }}
          git clone --depth=1 ${{ github.event.inputs.kernel_vendor_repo }}
          git clone --depth=1 ${{ github.event.inputs.kernel_devicetrees_repo }}
          mv android_kernel_oneplus_sm8650-devicetrees sm8650-devicetrees
          mv android_kernel_oneplus_sm8650-modules sm8650-modules
      - name: 安装KernelSu_Next
        run: |
          cd ~/kernel_source/android_kernel_oneplus_sm8650/
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
      - name: 修复内核源码头文件引用问题
        run: |
          cd ~/kernel_source/android_kernel_oneplus_sm8650
          sed -i '133s/$/ \\/; 133a \                     -I$(srctree)\/$(src)' scripts/Makefile.lib
          sed -i 's/-dirty//g' scripts/setlocalversion
          sed -i '79,95d' ./kernel/module/signing.c
      - name: 使用官方脚本开启 Docker 选项
        run: |
          cd ~/kernel_source/android_kernel_oneplus_sm8650/
          make ARCH=arm64 O=out LLVM=1 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump READELF=llvm-readelf STRIP=llvm-strip HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-Wno-error" gki_defconfig vendor/pineapple_GKI.config vendor/oplus/pineapple_GKI.config
          echo "[*] 正在精准开启 Docker 配置项..."
          # 开启 Namespaces 和 Cgroups
          ./scripts/config --file out/.config -e NAMESPACES -e UTS_NS -e IPC_NS -e USER_NS -e PID_NS -e NET_NS
          ./scripts/config --file out/.config -e CGROUPS -e MEMCG -e BLK_CGROUP -e CGROUP_SCHED -e CGROUP_PIDS -e CGROUP_FREEZER -e CPUSETS -e CGROUP_DEVICE -e CGROUP_CPUACCT
          # 开启网络和 OverlayFS
          ./scripts/config --file out/.config -e VETH -e BRIDGE -e BRIDGE_NETFILTER
          ./scripts/config --file out/.config -e NETFILTER_XT_MATCH_ADDRTYPE -e NETFILTER_XT_MATCH_CONNTRACK -e NETFILTER_XT_MATCH_IPVS -e NETFILTER_XT_MARK
          ./scripts/config --file out/.config -e IP_NF_NAT -e IP_NF_TARGET_MASQUERADE -e IP_NF_FILTER
          ./scripts/config --file out/.config -e OVERLAY_FS -e SECCOMP -e POSIX_MQUEUE -e KEYS
          # 极其关键的一步：解决依赖冲突！
          echo "[*] 执行 olddefconfig 以应用配置并解决依赖..."
          make ARCH=arm64 O=out LLVM=1 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump READELF=llvm-readelf STRIP=llvm-strip HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-Wno-error" olddefconfig
      - name: 开始编译内核
        run: |
          cd ~/kernel_source/android_kernel_oneplus_sm8650/
          make ARCH=arm64 O=out LLVM=1 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump READELF=llvm-readelf STRIP=llvm-strip HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-Wno-error" -j$(nproc)
      - name: 生成内核模块并打包
        run: |
          echo "编译器版本:$(clang --version)"
          cd ~/kernel_source/android_kernel_oneplus_sm8650
          mkdir -p install_modules
          make -j$(nproc) ARCH=arm64 \
          INSTALL_MOD_PATH=install_modules \
          modules_install
          find install_modules -name "*.ko" -exec /home/runner/build_tools/aosp_clang/bin/llvm-strip --strip-debug {} +
          cp ~/kernel_source/android_kernel_oneplus_sm8650/System.map ~/kernel_source/android_kernel_oneplus_sm8650/install_modules/
          zip -ry kernel_ko.zip install_modules/
      - name: 制作 AnyKernel3 刷机包
        run: |
          cd ~/kernel_source/android_kernel_oneplus_sm8650
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ~/kernel_source/android_kernel_oneplus_sm8650/AnyKernel
          if [ ! -f ~/kernel_source/android_kernel_oneplus_sm8650/arch/arm64/boot/Image ]; then
            echo "错误：找不到编译生成的 Image 文件！"
            exit 1
          fi
          
          cp ~/kernel_source/android_kernel_oneplus_sm8650/arch/arm64/boot/Image ~/kernel_source/android_kernel_oneplus_sm8650/AnyKernel/Image
          cd ~/kernel_source/android_kernel_oneplus_sm8650/AnyKernel
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          chmod -R 755 .
          chmod 755 ~/kernel_source/android_kernel_oneplus_sm8650/AnyKernel/*
          cp ~/kernel_source/android_kernel_oneplus_sm8650/.config ~/kernel_source/android_kernel_oneplus_sm8650/AnyKernel/ssz.txt
          
          zip -r9y ../OnePlus12-Kernel.zip ./*
          
      - name: 发布你的成品
        uses: actions/upload-artifact@v6
        with:
          # 现在的路径就在根目录了
          path: ~/kernel_source/android_kernel_oneplus_sm8650/*.zip
          archive: false
