name: OP12_Kernel_Build

on: 
  workflow_dispatch: 
      inputs:
        kernel_repo:
            description: '请输入内核源码仓库地址:'
            required: true
        kernel_vendor_repo:
            description: '请输入内核vendor源码仓库地址:'
            required: true
        kernel_devicetrees_repo:
            description: '请输入内核devicetrees源码仓库地址:'
            required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 释放磁盘空间
        run: |
         sudo rm -rf /usr/share/dotnet
         sudo rm -rf /usr/local/lib/android
         sudo rm -rf /opt/ghc
         sudo rm -rf "/usr/local/share/boost"
         sudo rm -rf /usr/share/swift
      - name: Set Swap Space
  # You may pin to the exact commit or the version.
  # uses: pierotofy/set-swap-space@49819abfb41bd9b44fb781159c033dba90353a7c
        uses: pierotofy/set-swap-space@v1.0
        with:
    # Swap space to create, in Gigabytes.
          swap-size-gb: 15 # optional, default is 10
          
      - name: 创建编译目录
        run: |
          cd ~ && mkdir build_tools && mkdir kernel_source
      - name: 安装环境依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git wget flex bison libssl-dev libelf-dev clang lld llvm python3 dwarves cpio xz-utils
      - name: 拉取编译工具链及内核源码
        run: |
         cd ~/build_tools
         wget https://github.com/PurrrsLitterbox/LLVM-stable/releases/download/llvmorg-22.1.0/clang.tar.zst
         tar -xf clang.tar.zst
         cd ~/kernel_source
         git clone --depth=1 ${{ github.event.inputs.kernel_repo }}
         git clone --depth=1 ${{ github.event.inputs.kernel_vendor_repo }}
         git clone --depth=1 ${{ github.event.inputs.kernel_devicetrees_repo }}
         mv android_kernel_oneplus_sm8650-devicetrees sm8650-devicetrees
         mv android_kernel_oneplus_sm8650-modules sm8650-modules
      - name: 安装KernelSu_Next
        run: |
          cd ~/kernel_source/android_kernel_oneplus_sm8650/
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
      - name: 添加DroidSpaces支持
        run: |
          cd ~/kernel_source/android_kernel_oneplus_sm8650/
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/01.6.1%2B_disable_crc_checks_for_lkms.patch
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/02.fix_restore%20cgroup%20file%20prefix%20handling%20.patch
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/03.5.15%2B_use_android_abi_padding_for_posix_mqueue.patch
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/04.use_android_abi_padding_for_sysvipc_task_struct.patch
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/optional/fix-docker-overlay2-on-f2fs.patch
          patch -p1 < 'fix-docker-overlay2-on-f2fs.patch'
          patch -p1 < '01.6.1+_disable_crc_checks_for_lkms.patch'
          patch -p1 < '02.fix_restore cgroup file prefix handling .patch'
          patch -p1 < '03.5.15+_use_android_abi_padding_for_posix_mqueue.patch'
          patch -p1 < '04.use_android_abi_padding_for_sysvipc_task_struct.patch'
          echo "CONFIG_SYSCTL=y" > arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_SYSVIPC=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_POSIX_MQUEUE=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_NAMESPACES=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_PID_NS=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_UTS_NS=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_IPC_NS=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_SECCOMP=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_SECCOMP_FILTER=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_CGROUPS=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_CGROUP_DEVICE=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_CGROUP_PIDS=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_MEMCG=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_CGROUP_SCHED=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_FAIR_GROUP_SCHED=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_CGROUP_FREEZER=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_CGROUP_NET_PRIO=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_DEVTMPFS=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_FW_LOADER=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_FW_LOADER_USER_HELPER=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_FW_LOADER_COMPRESS=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_NET_NS=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_VETH=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_BRIDGE=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_NETFILTER=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_BRIDGE_NETFILTER=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_NETFILTER_ADVANCED=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_NF_CONNTRACK=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_IP_NF_IPTABLES=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_IP_NF_FILTER=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_NF_NAT=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_NF_TABLES=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_IP_NF_TARGET_MASQUERADE=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_NETFILTER_XT_TARGET_MASQUERADE=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_NETFILTER_XT_TARGET_TCPMSS=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_NF_CONNTRACK_NETLINK=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_NF_NAT_REDIRECT=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_IP_ADVANCED_ROUTER=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_IP_MULTIPLE_TABLES=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_TRIM_UNUSED_KSYMS=n" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_MODULE_COMPRESS=n" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_MODULE_SIG=n" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_MODULE_FORCE_LOAD=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_MODULE_UNLOAD=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_MODULE_SRCVERSION_ALL=n" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_MODVERSIONS=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_MODULE_FORCE_UNLOAD=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_MODULES=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_LTO_CLANG=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_ARCH_SUPPORTS_LTO_CLANG=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_ARCH_SUPPORTS_LTO_CLANG_THIN=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_HAS_LTO_CLANG=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_LTO_CLANG_THIN=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_LTO=y" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_LOCALVERSION="-Noevil"" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
          echo "CONFIG_LOCALVERSION_AUTO=n" >> arch/arm64/configs/vendor/oplus/Droidspaces.config
      - name: 设置环境变量并编译内核
        run: |
          cd ~/kernel_source/android_kernel_oneplus_sm8650
          CLANG_BIN=/home/runner/build_tools/bin
          export PATH=$CLANG_BIN:$PATH
          clang --version
          make ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 gki_defconfig vendor/oplus/Droidspaces.config
          make ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 -j$(nproc)
      - name: 制作 AnyKernel3 刷机包
        run: |
          cd ~/kernel_source/android_kernel_oneplus_sm8650
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ~/kernel_source/android_kernel_oneplus_sm8650/AnyKernel
          if [ ! -f ~/kernel_source/android_kernel_oneplus_sm8650/arch/arm64/boot/Image ]; then
            echo "错误：找不到编译生成的 Image 文件！"
            exit 1
          fi
          
          cp ~/kernel_source/android_kernel_oneplus_sm8650/arch/arm64/boot/Image ~/kernel_source/android_kernel_oneplus_sm8650/AnyKernel/Image
          cd ~/kernel_source/android_kernel_oneplus_sm8650/AnyKernel
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          zip -r9 ../OnePlus12-Kernel.zip ./*
          
      - name: 发布你的成品
        uses: actions/upload-artifact@v6
        with:
          name: Flashable-Kernel-Zip
          # 现在的路径就在根目录了
          path: ~/kernel_source/android_kernel_oneplus_sm8650/OnePlus12-Kernel.zip         
