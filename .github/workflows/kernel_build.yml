name: OP12_Kernel_Build_Optimized

on: 
  workflow_dispatch: 
    inputs:
      kernel_repo:
        description: '请输入内核源码仓库地址:'
        required: true
      kernel_vendor_repo:
        description: '请输入内核vendor源码仓库地址:'
        required: true
      kernel_devicetrees_repo:
        description: '请输入内核devicetrees源码仓库地址:'
        required: true

# 核心环境变量，一次定义，全局通用
env:
  WORKDIR: /home/runner
  KERNEL_DIR: /home/runner/android_kernel_oneplus_sm8650
  CLANG_DIR: /home/runner/aosp_clang
  CCACHE_DIR: /home/runner/.ccache
  # 把那一大串编译参数全部收拢为一个变量，并注入 ccache
  MAKE_ENV: ARCH=arm64 O=out LLVM=1 LLVM_IAS=1 HOSTCC=clang HOSTCXX=clang++ CC="ccache clang" LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump READELF=llvm-readelf STRIP=llvm-strip KCFLAGS="-Wno-error"
  BUILD_TIME: $(date +'%Y%m%d_%H%M')

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 释放磁盘空间 (The Purge)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/share/swift
          
      - name: 设置虚拟内存 (Swap)
        uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 16
          
      - name: 安装环境依赖 (带 ccache)
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git wget flex bison libssl-dev libelf-dev clang lld llvm python3 dwarves cpio xz-utils ccache
          
      - name: 配置 CCache 编译缓存 (提速神器)
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}  # <--- 动态引用全局变量
          key: ${{ runner.os }}-kernel-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-kernel-ccache-

      - name: 初始化 CCache 物理结界
        run: |
          # 就算天塌下来，也要先把这个文件夹捏出来
          mkdir -p ${{ env.CCACHE_DIR }}
          # 把缓存上限从默认的 500M 强行拉爆到 5GB
          ccache -M 5G


      - name: 下载并配置 Clang 编译器
        run: |
          cd ${{ env.WORKDIR }}
          wget -q https://github.com/bachnxuan/aosp_clang_mirror/releases/download/clang-r596125-15071444/clang-r596125.tar.gz
          mkdir -p ${{ env.CLANG_DIR }}
          tar -zxf clang-r596125.tar.gz -C ${{ env.CLANG_DIR }}
          # 直接将 clang 的 bin 目录和 ccache 注入环境变量
          echo "PATH=${{ env.CLANG_DIR }}/bin:/usr/lib/ccache:$PATH" >> $GITHUB_ENV
          echo "✅ 编译器部署完毕"

      - name: 拉取内核源码 (精准对齐软链接)
        run: |
          cd ${{ env.WORKDIR }}
          # 逻辑重构：git clone 时直接指定目标文件夹名字，一步剥离 "android_kernel_oneplus_" 前缀
          # 且让这三个仓库在 /home/runner/ 下保持绝对的平级关系，完美修复 ../ 软链接指向
          git clone --depth=1 ${{ github.event.inputs.kernel_repo }} android_kernel_oneplus_sm8650
          git clone --depth=1 ${{ github.event.inputs.kernel_vendor_repo }} sm8650-modules
          git clone --depth=1 ${{ github.event.inputs.kernel_devicetrees_repo }} sm8650-devicetrees
          echo "✅ 源码拉取完毕，平级目录结构就绪"

      - name: 安装 KernelSU Next
        run: |
          cd ${{ env.KERNEL_DIR }}
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -

      - name: 修改源码 && 应用补丁
        run: |
          cd ${{ env.KERNEL_DIR }}
          # 1. 洗白内核版本号后缀
          sed -i 's/-dirty//g' scripts/setlocalversion
          rm -rf ./android/abi_gki_protected_exports_*
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch
          wget https://raw.githubusercontent.com/DaDDevil/OnePlus_12_Kernel_Build/refs/heads/main/01.6.1%2B_disable_crc_checks_for_lkms.patch
          wget https://raw.githubusercontent.com/ahmed-alnassif/GKI-Duchamp/refs/heads/dev/kernel-patches/bbrv3/bbrv3.patch
          patch -p1 < bbrv3.patch
          patch -p1 < 001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch
          patch -p1 < 01.6.1+_disable_crc_checks_for_lkms.patch
      
      - name: 配置内核并注入 Docker 选项
        run: |
          cd ${{ env.KERNEL_DIR }}
          # 基础配置
          make ${{ env.MAKE_ENV }} gki_defconfig vendor/pineapple_GKI.config vendor/oplus/pineapple_GKI.config
          # 注入 Docker/LXC 所需配置
          ./scripts/config --file out/.config -e PID_NS -e DEVTMPFS -e FW_LOADER_COMPRESS -e BTRFS_FS -e BTRFS_FS_POSIX_ACL -e LTO_CLANG -e LTO_CLANG_THIN -e USER_NS -e SYSVIPC -e IP6_NF_TARGET_MASQUERADE -e NETFILTER_XT_MATCH_ADDRTYPE
          # Network BBRv3
          ./scripts/config --file out/.config -e CONFIG_HZ_300 -e TCP_CONG_ADVANCED -e TCP_CONG_BBR -e DEFAULT_BBR -e ZRAM_DEF_COMP_LZ4 -d ZRAM_DEF_COMP_LZORLE -e ZRAM_WRITEBACK -e HIBERNATION_COMP_LZ4 -d HIBERNATION_COMP_LZO
          # echo "[*] 正在注射 透明巨大页 (THP) 续命血清..."
          # 启用完整的命名空间和 Cgroup 支持
          ./scripts/config --file out/.config --enable CONFIG_NAMESPACES
          ./scripts/config --file out/.config --enable CONFIG_USER_NS
          ./scripts/config --file out/.config --enable CONFIG_CGROUPS
          ./scripts/config --file out/.config --enable CONFIG_CGROUP_FREEZER
          ./scripts/config --file out/.config --enable CONFIG_MACVLAN
          ./scripts/config --file out/.config --enable CONFIG_VETH
          # 应用并补全依赖
          make ${{ env.MAKE_ENV }} olddefconfig
          
      - name: 开始编译内核 (火力全开)
        run: |
          cd ${{ env.KERNEL_DIR }}
          ccache -z # 归零缓存统计
          make ${{ env.MAKE_ENV }} -j$(nproc)
          ccache -s # 打印缓存命中率

      - name: 开始编译内核模块
        run: |
          cd ${{ env.WORKDIR }}/sm8650-modules
          export KERNEL_SRC="${{ env.KERNEL_DIR }}"
          wget https://raw.githubusercontent.com/DaDDevil/OnePlus_12_Kernel_Build/refs/heads/main/build_modules_new.py
          chmod +x *.py
          python build_modules_new.py

      - name: 🚚 提取、精简并优化产物
        run: |
          cd ${{ env.KERNEL_DIR }}
          
          # 1. 创建输出暂存区
          echo "📂 建立暂存目录 staging/modules..."
          mkdir -p staging/modules 
          
          # 2. 自动递归寻找所有 .ko 并扁平化移动 (已修复 cp 语法致命 BUG)
          # 注意这里加了 -t 参数，意思是将 staging/modules/ 指定为目标目录，这样 {} + 追加的文件列表才合法
          echo "🔍 开始全盘搜集 .ko 模块文件..."
          find ${{ env.WORKDIR }} -name "*.ko" -exec cp -t staging/modules/ {} +
          
          # 3. 🛡️ 核心验证机制：物理清点资产
          KO_COUNT=$(find staging/modules/ -name "*.ko" | wc -l)
          echo "📊 统计到 $KO_COUNT 个 .ko 文件。"
          
          if [ "$KO_COUNT" -eq 0 ]; then
            echo "❌ 致命错误：未能提取到任何 .ko 文件！流水线在此阻断。"
            echo "👉 请检查上一步编译阶段是否真的生成了外置模块，或检查路径配置。"
            exit 1
          else
            echo "✅ 成功捕获 $KO_COUNT 个驱动模块，允许放行！"
          fi
          
          # 4. 去除 Debug 日志与调试符号 (降维打击)
          echo "🪚 开始使用 llvm-strip 剥离调试符号..."
          find staging/modules/ -name "*.ko" -exec ${{ env.CLANG_DIR }}/bin/llvm-strip --strip-debug {} +
          
          # 5. 打包产物 (优化打包层级)
          echo "📦 开始生成带时间戳的压缩包..."
          # 先进入 staging 目录打包，这样解压出来的包内结构就是干净的 modules/ 目录，没有冗余的上级路径
          cd staging
          zip -r ${{ env.WORKDIR }}/OnePlus12_Kernel_modules_${{ env.BUILD_TIME }}.zip modules/
          echo "🎉 产物提取与打包彻底完成！"


      - name: 制作 AnyKernel3 刷机包 (逻辑重构)
        run: |
          cd ${{ env.WORKDIR }}
          git clone --depth=1 https://github.com/cctv18/AnyKernel3.git AnyKernel3
          # 1. 拷贝内核到 AK3
          cp ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image ./AnyKernel3/
          # 2. 拷贝内核.config
          cp ${{ env.KERNEL_DIR }}/out/.config ./AnyKernel3/
          # 3. 删除无用文件并规范打包（-y 保留符号链接，非常重要）
          rm -rf ./AnyKernel3/.git README.md
          cd ./AnyKernel3
          # 4. 压缩内核刷机包
          zip -r9y ../OnePlus12_Kernel_${{ env.BUILD_TIME }}.zip *

      - name: 🚀 发布最终成品
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus12-Kernel-Build
          path: |
            ${{ env.WORKDIR }}/*.zip
          compression-level: 0 # 已经是zip了，不要再让 Action 费力压缩
