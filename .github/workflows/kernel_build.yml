name: OP12_Kernel_Build_Optimized

on: 
  workflow_dispatch: 
    inputs:
      kernel_repo:
        description: '请输入内核源码仓库地址:'
        required: true
      kernel_vendor_repo:
        description: '请输入内核vendor源码仓库地址:'
        required: true
      kernel_devicetrees_repo:
        description: '请输入内核devicetrees源码仓库地址:'
        required: true

# 核心环境变量，一次定义，全局通用
env:
  WORKDIR: /home/runner
  KERNEL_DIR: /home/runner/android_kernel_oneplus_sm8650
  CLANG_DIR: /home/runner/aosp_clang
  CCACHE_DIR: /home/runner/.ccache
  # 把那一大串编译参数全部收拢为一个变量，并注入 ccache
  MAKE_ENV: ARCH=arm64 O=out LLVM=1 LLVM_IAS=1 HOSTCC=clang HOSTCXX=clang++ CC="ccache clang" LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump READELF=llvm-readelf STRIP=llvm-strip KCFLAGS="-Wno-error"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 释放磁盘空间 (The Purge)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/share/swift
          
      - name: 设置虚拟内存 (Swap)
        uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 15
          
      - name: 安装环境依赖 (带 ccache)
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git wget flex bison libssl-dev libelf-dev clang lld llvm python3 dwarves cpio xz-utils ccache
          
      - name: 配置 CCache 编译缓存 (提速神器)
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}  # <--- 动态引用全局变量
          key: ${{ runner.os }}-kernel-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-kernel-ccache-

      - name: 初始化 CCache 物理结界
        run: |
          # 就算天塌下来，也要先把这个文件夹捏出来
          mkdir -p ${{ env.CCACHE_DIR }}
          # 把缓存上限从默认的 500M 强行拉爆到 5GB
          ccache -M 5G


      - name: 下载并配置 Clang 编译器
        run: |
          cd ${{ env.WORKDIR }}
          wget -q https://github.com/bachnxuan/aosp_clang_mirror/releases/download/clang-r596125-15071444/clang-r596125.tar.gz
          mkdir -p ${{ env.CLANG_DIR }}
          tar -zxf clang-r596125.tar.gz -C ${{ env.CLANG_DIR }}
          # 直接将 clang 的 bin 目录和 ccache 注入环境变量
          echo "PATH=${{ env.CLANG_DIR }}/bin:/usr/lib/ccache:$PATH" >> $GITHUB_ENV
          echo "✅ 编译器部署完毕"

      - name: 拉取内核源码 (精准对齐软链接)
        run: |
          cd ${{ env.WORKDIR }}
          # 逻辑重构：git clone 时直接指定目标文件夹名字，一步剥离 "android_kernel_oneplus_" 前缀
          # 且让这三个仓库在 /home/runner/ 下保持绝对的平级关系，完美修复 ../ 软链接指向
          git clone --depth=1 ${{ github.event.inputs.kernel_repo }} android_kernel_oneplus_sm8650
          git clone --depth=1 ${{ github.event.inputs.kernel_vendor_repo }} sm8650-modules
          git clone --depth=1 ${{ github.event.inputs.kernel_devicetrees_repo }} sm8650-devicetrees
          echo "✅ 源码拉取完毕，平级目录结构就绪"

      - name: 安装 KernelSU_Next
        run: |
          cd ${{ env.KERNEL_DIR }}
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -

      - name: 源码级修复与“上帝模式”破解
        run: |
          cd ${{ env.KERNEL_DIR }}
          # 1. 修复 Tracepoint 相对路径问题
          sed -i '133s/$/ \\/; 133a \                     -I$(srctree)\/$(src)' scripts/Makefile.lib
          # 2. 洗白内核版本号后缀
          sed -i 's/-dirty//g' scripts/setlocalversion
          sed -i 's/CONFIG_LOG_BUF_SHIFT=17/CONFIG_LOG_BUF_SHIFT=20/g' arch/arm64/configs/vendor/oplus/pineapple_GKI.config
          
          # 3. 终极签名破解：使用 Python 精准替换 module_sig_check 函数
          cat << 'EOF' > patch_sig.py
          import re
          with open('kernel/module/signing.c', 'r') as f:
              content = f.read()
          # 强行把函数体替换为直接放行
          content = re.sub(r'int module_sig_check\(.*?\)\s*\{.*?\n\}', 'int module_sig_check(struct load_info *info, int flags) {\n\tinfo->sig_ok = true;\n\treturn 0;\n}', content, flags=re.DOTALL)
          with open('kernel/module/signing.c', 'w') as f:
              f.write(content)
          EOF
          python3 patch_sig.py
          echo "✅ 签名保护已物理拆除"
          rm -rf ./android/abi_gki_protected_exports_*
          rm -rf ./android/abi_gki_aarch64_qcom
          rm -rf ./android/abi_gki_aarch64_oplus

      - name: 🛠️ 植入 Docker 终极修复补丁
        run: |
          cd ${{ env.KERNEL_DIR }}
          #wget https://github.com/aled99/op12-kernel/commit/1cc769fcad3ba70f2f69032f5378c235b44de45c.patch -O yh.patch
          #wget https://github.com/aled99/op12-kernel/commit/3b549102f82ff6e231b2d88701c21df71ba22f04.patch -O autofdo.patch
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/01.6.1%2B_disable_crc_checks_for_lkms.patch
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/02.fix_restore%20cgroup%20file%20prefix%20handling%20.patch
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/03.5.15%2B_use_android_abi_padding_for_posix_mqueue.patch
          wget https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/04.use_android_abi_padding_for_sysvipc_task_struct.patch
          for i in *.patch; do patch -p1 < "$i"; done
      
      - name: 配置内核并注入 Docker 选项
        run: |
          cd ${{ env.KERNEL_DIR }}
          # 基础配置
          make ${{ env.MAKE_ENV }} gki_defconfig vendor/pineapple_GKI.config vendor/oplus/pineapple_GKI.config
          # 注入 Docker/LXC 所需配置
          ./scripts/config --file out/.config -e PID_NS -e USER_NS -e MODULE_SIG_PROTECT -e DEVTMPFS -e SYSVIPC -e BRIDGE_NETFILTER -e NF_CONNTRACK_NETLINK -e FW_LOADER_COMPRESS -e IKCONFIG_PROC -e IKCONFIG -e IP6_NF_NAT -e IP6_NF_TARGET_MASQUERADE
          ./scripts/config --file out/.config -e BTRFS_FS_POSIX_ACL -e BTRFS_FS -e NETFILTER_XT_MATCH_IPVS -e AUTOFDO_CLANG -e TMPFS_XATTR -e CFS_BANDWIDTH -e CGROUP_DEVICE -e CGROUP_PERF -e CGROUP_PIDS

          # 应用并补全依赖
          #make ${{ env.MAKE_ENV }} olddefconfig
          echo "[*] 正在注射 透明巨大页 (THP) 续命血清..."
          # 开启透明大页核心支持
          ./scripts/config --file out/.config -e TRANSPARENT_HUGEPAGE
          # 建议设为 MADVISE (按需分配)，而不是 ALWAYS，避免宿主机日常使用内存爆炸
          ./scripts/config --file out/.config -d TRANSPARENT_HUGEPAGE_ALWAYS -e TRANSPARENT_HUGEPAGE_MADVISE
          # 确保共享内存 (shmem) 支持大页，这对 crosvm 极其重要
          ./scripts/config --file out/.config -e TRANSPARENT_HUGE_PAGECACHE
          
      - name: 开始编译内核 (火力全开)
        run: |
          cd ${{ env.KERNEL_DIR }}
          echo "=y" >> arch/arm64/configs/vendor/oplus/pineapple_GKI.config
          echo "CONFIG_OPLUS_DEVICE_DTBS=y" >> arch/arm64/configs/vendor/oplus/pineapple_GKI.config
          ccache -z # 归零缓存统计
          make ${{ env.MAKE_ENV }} -j$(nproc)
          ccache -s # 打印缓存命中率

      - name: ⚙️ 编译树外驱动 (Techpack OOT Modules)
        run: |
          cd ${{ env.WORKDIR }}

          # 1. 核心目录映射
          export KERNEL_SRC="${{ env.KERNEL_DIR }}"
          export OUT_DIR="${{ env.KERNEL_DIR }}/out"
          
          # 2. 定义缺失的树外模块列表 (严格按照依赖顺序排列)
          # 注意：基础模块(如 synx, mmrm)必须放在依赖它的模块(如 eva, camera)前面
          EXT_MODULES="sm8650-modules/qcom/opensource/synx-kernel \
                       sm8650-modules/qcom/opensource/securemsm-kernel \
                       sm8650-modules/qcom/opensource/mmrm-driver \
                       sm8650-modules/qcom/opensource/dsp-kernel \
                       sm8650-modules/qcom/opensource/eva-kernel \
                       sm8650-modules/qcom/opensource/mm-sys-kernel/ubwcp \
                       sm8650-modules/qcom/opensource/spu-kernel \
                       sm8650-modules/qcom/opensource/touch-drivers \
                       sm8650-modules/qcom/opensource/video-driver \
                       sm8650-modules/qcom/opensource/mm-drivers/hw_fence \
                       sm8650-modules/qcom/opensource/mm-drivers/msm_ext_display \
                       sm8650-modules/qcom/opensource/mm-drivers/sync_fence \
                       sm8650-modules/qcom/opensource/graphics-kernel \
                       sm8650-modules/qcom/opensource/datarmnet-ext/mem \
                       sm8650-modules/qcom/opensource/data-ipa \
                       sm8650-modules/qcom/opensource/datarmnet/core \
                       sm8650-modules/qcom/opensource/datarmnet-ext/wlan \
                       sm8650-modules/qcom/opensource/datarmnet-ext/aps \
                       sm8650-modules/qcom/opensource/datarmnet-ext/offload \
                       sm8650-modules/qcom/opensource/datarmnet-ext/perf \
                       sm8650-modules/qcom/opensource/datarmnet-ext/perf_tether \
                       sm8650-modules/qcom/opensource/datarmnet-ext/sch \
                       sm8650-modules/qcom/opensource/datarmnet-ext/shs \
                       sm8650-modules/qcom/opensource/display-drivers \
                       sm8650-modules/qcom/opensource/camera-kernel \
                       sm8650-modules/qcom/opensource/wlan/platform \
                       sm8650-modules/qcom/opensource/wlan/qcacld-3.0 \
                       sm8650-modules/qcom/opensource/bt-kernel \
                       sm8650-modules/qcom/opensource/audio-kernel"
                       
          echo "🔍 准备就绪，开始执行官方 OOT 编译逻辑..."

          # 3. 循环进入每个模块执行独立编译
          for EXT_MOD in $EXT_MODULES; do
            echo "========================================================"
            echo " 🏗️ 正在编译: $EXT_MOD"

            # 1. 绝对路径定义
            MOD_PWD="${{ env.WORKDIR }}/$EXT_MOD"
            
            # 2. 基础高通参数
            QCOM_ARGS="BOARD_PLATFORM=pineapple TARGET_BOARD_PLATFORM=pineapple"

            # 3. 【黑科技】正则表达式动态提取 XXX_ROOT
            # 扫描该模块的 Makefile 和 Kbuild，找出所有以 _ROOT 结尾的宏（如 WLAN_ROOT, AUDIO_ROOT）
            DETECTED_ROOTS=$(grep -hoE '[A-Za-z0-9_]+_ROOT' "$MOD_PWD/Makefile" "$MOD_PWD/Kbuild" 2>/dev/null | sort -u)
            
            # 遍历提取到的宏，拼接到 QCOM_ARGS 里
            if [ -n "$DETECTED_ROOTS" ]; then
                for ROOT_VAR in $DETECTED_ROOTS; do
                    QCOM_ARGS="$QCOM_ARGS $ROOT_VAR=$MOD_PWD"
                done
                echo "🎯 动态侦测到专属参数: $QCOM_ARGS"
            else
                echo "ℹ️ 该模块无需特殊的 ROOT 路径"
            fi

            if [[ "$EXT_MOD" == *"video-driver"* || "$EXT_MOD" == *"msm_video"* ]]; then
                echo "🎬 侦测到视频驱动，注入硬件代号总开关 VIDEO_SELECT..."
                # 直接传总开关，让高通的 Makefile 自己去展开那些 Volcano 和 Iris2
                QCOM_ARGS="$QCOM_ARGS VIDEO_SELECT=pineapple"
                QCOM_ARGS="$QCOM_ARGS CONFIG_MSM_VIDC_VOLCANO=y CONFIG_MSM_VIDC_IRIS2=y CONFIG_MSM_VIDC_PINEAPPLE=y"
            fi
            
            # 【黑科技】动态打捞当前已生成的所有 Module.symvers 
            # 这行代码完美替代了复杂的依赖声明，只要前面编过的，后面的模块都能认出它的符号
            ALL_SYMS=$(find "$OUT_DIR" "${{ env.WORKDIR }}/sm8650-modules" -name "Module.symvers" 2>/dev/null | grep -v "^$OUT_DIR/Module.symvers$" | tr '\n' ' ')
            
            # 核心编译指令 (精准复刻 build_module.sh 逻辑)
            # -C 指向主内核工作树，M 指向树外模块绝对路径
            make ${{ env.MAKE_ENV }} -C "$KERNEL_SRC" \
                 M="${{ env.WORKDIR }}/$EXT_MOD" \
                 O="$OUT_DIR" \
                 KERNEL_SRC="$KERNEL_SRC" \
                 KBUILD_EXTRA_SYMBOLS="$ALL_SYMS" \
                 $QCOM_ARGS \
                 modules -j$(nproc)
          done

      - name: 🛠️ 精准提取主内核模块 (KO)
        run: |
          cd ${{ env.KERNEL_DIR }}
          # 1. 定义一个干净的存放点
          KO_STAGING="${{ env.WORKDIR }}/main_kernel_ko"
          mkdir -p "$KO_STAGING"

          echo "🔍 正在从主内核 out 目录捞取 .ko..."
          
          # 2. 直接从 out 目录中提取真正的内核模块
          # 排除掉 vendor 仓库（如果你在里面建了软链接）和中间 obj 目录的干扰
          # -type f 确保只找文件，不找符号链接
          find out -name "*.ko" -type f | while read -r file; do
              echo "📦 捡到模块: $(basename "$file")"
              cp -f "$file" "$KO_STAGING/"
          done

          # 3. 物理剥离调试信息 (这是减小体积的关键，否则一个 ko 可能几十 MB)
          echo "✂️  正在 Stripping..."
          find "$KO_STAGING" -name "*.ko" -exec ${{ env.CLANG_DIR }}/bin/llvm-strip --strip-debug {} +

          # 4. 只有捡到了模块才进行下一步，否则报错（防止发空包）
          [ "$(ls -A $KO_STAGING)" ] || { echo "❌ 没搜到 .ko 文件！检查你的 defconfig 是否全是 =y"; exit 1; }

          # 5. 压缩成独立的模块包
          cd "$KO_STAGING"
          cp ${{ env.KERNEL_DIR }}/out/vmlinux .
          zip -r9y ${{ env.WORKDIR }}/main_kernel_ko.zip .
          
      - name: 制作 AnyKernel3 刷机包 (逻辑重构)
        run: |
          cd ${{ env.WORKDIR }}
          git clone --depth=1 https://github.com/cctv18/AnyKernel3.git AnyKernel3
      
          # 1. 拷贝内核到 AK3
          cp ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image ./AnyKernel3/
      
          # 2. 删除无用文件并规范打包（-y 保留符号链接，非常重要）
          rm -rf ./AnyKernel3/.git README.md
          cd ./AnyKernel3
          zip -r9y ../OnePlus12-Kernel-AK3.zip *

      - name: 🚀 发布最终成品
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus12-Kernel-Build
          path: |
            ${{ env.WORKDIR }}/OnePlus12-Kernel-AK3.zip
            ${{ env.WORKDIR }}/main_kernel_ko.zip
          compression-level: 0 # 已经是zip了，不要再让 Action 费力压缩
